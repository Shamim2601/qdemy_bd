<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Katakuti Game</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            p{
                color: purple;
            }
            .field{
                width: 200px;
                padding-left: 30%;
                padding-top: 100px;
            }
            .cell{
                height: 60px;
                width: 60px;
                border: 3px solid purple;
                float: left;
                font-size: 50px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <h3>Refresh to play again</h3>
        <div class="field">
            <div class="cell">

            </div>
            <div class="cell">
                
            </div>
            <div class="cell">
                
            </div>
            <div class="cell">

            </div>
            <div class="cell">
                
            </div>
            <div class="cell">
                
            </div>
            <div class="cell">

            </div>
            <div class="cell">
                
            </div>
            <div class="cell">
                
            </div>
        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script>
            count = 0;
            $(".cell").click(function(){
                if(count%2==0){
                    $(this).text("O");
                }
                else{
                    $(this).text("X");
                }
                count+=1;
            })
        </script>
    </body>
</html>
