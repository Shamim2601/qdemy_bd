<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Word Making Game</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!--link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css"-->
        <style>
            p{
                color: purple;
            }
            .field{
                width: 400px;
                padding-top: 30px;
            }
            .cell{
                height: 60px;
                width: 60px;
                border: 3px solid purple;
                float: left;
                font-size: 50px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <h3 style="text-align: center;"><u>Refresh to play again</u><br>Play Word-Making Game with Friends<br>Enter a letter in the input box and click on any cell</h3><br>
        
        <input id="test" type="text" style="margin-right: 20px; width: 100px;"> 
        <level >Try: </level><level id="num"></level>
        <button id="btn" style="margin-left: 20px;">New Word</button>

        <div class="field">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script>
            count = 0;
            $("#num").text(count);
            $(".cell").click(function(){
                string = (String) ($("#test").val());
                char = string.charAt(string.length -1);
                $(this).text(char);
                count++;
                $("#num").text(count);
            });
            $("#btn").click(function(){
                count = 0;
                $("#num").text(count);
            });
        </script>
    </body>
</html>
